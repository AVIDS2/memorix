    <path d="M32 352C154 292 251 309 356 250C456 194 520 124 658 91" stroke="#A391C8" stroke-width="2" stroke-opacity="0.34" stroke-linecap="round"/>
    <path d="M42 284C169 274 255 238 361 163C445 103 535 99 668 133" stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.62" stroke-linecap="round"/>
    <path d="M136 72C234 122 331 112 428 78C507 50 575 48 692 72" stroke="#D3D3D3" stroke-width="2" stroke-opacity="0.75" stroke-linecap="round"/>

    <g filter="url(#paperShadow)" transform="rotate(-5 164 224)">
      <rect x="76" y="72" width="220" height="286" rx="26" fill="url(#cardA)" stroke="#FFFFFF" stroke-width="2"/>
      <rect x="104" y="108" width="96" height="18" rx="9" fill="#B19CD9" fill-opacity="0.48"/>
      <rect x="104" y="146" width="148" height="12" rx="6" fill="#D3D3D3"/>
      <rect x="104" y="172" width="116" height="12" rx="6" fill="#D3D3D3" fill-opacity="0.72"/>
      <rect x="104" y="224" width="164" height="72" rx="18" fill="#F6F2FB" stroke="#E4DDF0"/>
      <circle cx="130" cy="260" r="12" fill="#B19CD9"/>
      <rect x="154" y="246" width="72" height="10" rx="5" fill="#8F7CC2" fill-opacity="0.64"/>
      <rect x="154" y="268" width="92" height="8" rx="4" fill="#D3D3D3"/>
      <text x="104" y="332" fill="#817391" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">SESSION</text>
    </g>

    <g filter="url(#paperShadow)">
      <rect x="286" y="118" width="260" height="318" rx="30" fill="url(#cardB)" stroke="#FFFFFF" stroke-width="2"/>
      <rect x="322" y="156" width="104" height="20" rx="10" fill="#FFFFFF" fill-opacity="0.62"/>
      <rect x="322" y="198" width="176" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.54"/>
      <rect x="322" y="228" width="142" height="14" rx="7" fill="#FFFFFF" fill-opacity="0.42"/>
      <rect x="322" y="274" width="188" height="78" rx="20" fill="#FFFFFF" fill-opacity="0.22" stroke="#FFFFFF" stroke-opacity="0.52"/>
      <path d="M348 316H484" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.8"/>
      <path d="M348 334H446" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-opacity="0.42"/>
      <text x="322" y="390" fill="#FFFFFF" fill-opacity="0.9" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="15" font-weight="750" letter-spacing="0.08em">PROJECT MEMORY</text>
    </g>

    <g filter="url(#smallShadow)" transform="rotate(4 613 231)">
      <rect x="554" y="92" width="196" height="266" rx="25" fill="#F2F0F4" stroke="#FFFFFF" stroke-width="2"/>
      <rect x="582" y="130" width="82" height="18" rx="9" fill="#B19CD9" fill-opacity="0.48"/>
      <rect x="582" y="172" width="122" height="12" rx="6" fill="#C9C6CD"/>
      <rect x="582" y="198" width="96" height="12" rx="6" fill="#C9C6CD" fill-opacity="0.72"/>
      <rect x="582" y="250" width="126" height="54" rx="16" fill="#FFFFFF" fill-opacity="0.58"/>
      <text x="582" y="332" fill="#867A99" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">HANDOFF</text>
    </g>

    <g>
      <circle cx="62" cy="353" r="10" fill="#B19CD9"/>
      <circle cx="154" cy="294" r="7" fill="#FFFFFF"/>
      <circle cx="319" cy="244" r="9" fill="#FFFFFF"/>
      <circle cx="416" cy="118" r="10" fill="#B19CD9"/>
      <circle cx="615" cy="97" r="8" fill="#FFFFFF"/>
      <circle cx="686" cy="72" r="9" fill="#B19CD9"/>
    </g>

    <g opacity="0.92">
      <rect x="34" y="374" width="132" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.74" stroke="#FFFFFF"/>
      <text x="100" y="397" text-anchor="middle" fill="#655A78" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700">Claude</text>
      <rect x="188" y="388" width="112" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.66" stroke="#FFFFFF"/>
      <text x="244" y="411" text-anchor="middle" fill="#655A78" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700">Codex</text>
      <rect x="558" y="376" width="126" height="36" rx="18" fill="#FFFFFF" fill-opacity="0.66" stroke="#FFFFFF"/>
      <text x="621" y="399" text-anchor="middle" fill="#655A78" font-family="Aptos, Segoe UI, system-ui, sans-serif" font-size="15" font-weight="700">Cursor</text>
