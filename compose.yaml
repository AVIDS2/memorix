services:
  memorix:
    build:
      context: .
      dockerfile: Dockerfile
    image: memorix:1.0.8-local
    init: true
    restart: unless-stopped
    ports:
      - "3211:3211"
    environment:
      MEMORIX_PROJECT_ROOT: /workspace
      MEMORIX_DATA_DIR: /data/.memorix/data
      # Keep HTTP MCP sessions alive for long IDE work blocks. Default is 30 min.
      MEMORIX_SESSION_TIMEOUT_MS: 86400000
    volumes:
      - memorix-data:/data
      - ./:/workspace
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3211/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  memorix-data:
