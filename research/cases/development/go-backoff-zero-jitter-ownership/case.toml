[transfer]
task = "Continue the randomization-helper extraction. A regression now violates a retained retry behavior when callers disable jitter. Restore that behavior in the current implementation without moving the helper back into exponential.go."
success_commands = ["go test ./..."]

[[memory_seed]]
entity_name = "zero-jitter-policy"
type = "decision"
title = "Disabled jitter is deterministic"
narrative = "When ExponentialBackOff.RandomizationFactor is zero, retry scheduling must return the current interval without sampling the random source. This lets callers explicitly disable jitter deterministically."
facts = ["RandomizationFactor = 0 returns the current interval", "RandomizationFactor = 0 must not sample the random source"]
files_modified = []
concepts = ["retry", "backoff", "jitter", "determinism"]
