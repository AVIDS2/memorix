schema_version = "0.5"
id = "go-cobra-completion-input-ownership"
title = "Completion input ownership transfers from captured review sessions"
split = "development"
dependency_strength = "medium"
dependency_classification_status = "retrospective-development"
language = "go"
tags = ["cross-session", "code-change", "input-ownership", "stale-symbol", "external-repository", "historically-grounded", "development-controlled", "trace-replay", "captured-session"]

[repository]
source_type = "git"
url = "https://github.com/spf13/cobra.git"
base_revision = "f2878bab8c96afd6e36968af96343b35dbb82a82"
license = "Apache-2.0"

[precursor]
task = "Review shell-completion argument handling and preserve any caller-ownership invariants while introducing a small completion-input helper."
success_commands = ["go test ./..."]
patch = "precursor.patch"

[transition]
kind = "code-change"
description = "A benchmark-authored helper extraction moves completionInput into completion_input.go and accidentally returns a view into the caller-owned input slice."
apply_commands = []
patch = "transition.patch"

[transfer]
task = "Continue the completion-input helper extraction. The transfer snapshot violates a retained caller-ownership behavior. Restore that behavior in completion_input.go without moving completionInput back into completions.go."
success_commands = ["go test ./..."]

[formation]
track = "trace-replay"

[formation.trace_bundle]
path = "traces/precursor-trace-bundle.json"
schema_version = "precursor-trace-bundle-v1"
selection = "hash-bucket-v1"
truncation = "event-suffix-v1"

[oracle]
visibility = "public"
required_start_files = ["completion_input.go", "completions.go"]
relevant_evidence_ids = ["policy:completion-input-ownership"]
stale_evidence_ids = ["code:completions.go#completionInput"]
forbidden_actions = ["move completionInput back into completions.go", "allow completion parsing to overwrite caller-owned input"]
hidden_patch = "hidden-tests.patch"
reference_patch = "reference.patch"

[[oracle.source_check]]
path = "completions.go"
forbidden_literals = ["func completionInput("]
