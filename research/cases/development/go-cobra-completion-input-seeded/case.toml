base_revision = "f2878bab8c96afd6e36968af96343b35dbb82a82"
license = "Apache-2.0"

[precursor]
task = "Review shell-completion argument handling and preserve any caller-ownership invariants while introducing a small completion-input helper."
success_commands = ["go test ./..."]
patch = "precursor.patch"
transcript = "precursor-transcript.md"

[transition]
kind = "code-change"
description = "A benchmark-authored helper extraction moves completionInput into completion_input.go and accidentally returns a view into the caller-owned input slice."
apply_commands = []
patch = "transition.patch"

[transfer]
task = "Continue the completion-input helper extraction. The transfer snapshot violates a retained caller-ownership behavior. Restore that behavior in completion_input.go without moving completionInput back into completions.go."
success_commands = ["go test ./..."]

[[memory_seed]]
entity_name = "completion-input-ownership"
type = "decision"
title = "Completion processing owns its completed arguments"
narrative = "Completion parsing can append a sentinel while checking flags. The completed-argument slice must be independent from the caller-owned input so that processing never rewrites the incomplete word supplied by the caller."
facts = ["Completion parsing may append a sentinel to completed arguments", "Appending during completion must not mutate the caller-owned input slice", "The incomplete word remains unchanged after completion processing"]
files_modified = []
concepts = ["completion", "slice-ownership", "caller-input", "refactor-safety"]
topic_key = "benchmark/go-cobra-completion-input-seeded/policy"

[[memory_seed]]
entity_name = "completion-input-owner"
type = "what-changed"
title = "Completion input helper location"
narrative = "At the precursor snapshot completionInput is defined in completions.go. Its location is an implementation detail; the caller-ownership behavior is the retained constraint."
facts = []
files_modified = ["completions.go"]
concepts = ["completion", "code-ownership"]
topic_key = "benchmark/go-cobra-completion-input-seeded/code-owner"

[oracle]
visibility = "public"
required_start_files = ["completion_input.go", "completions.go"]
relevant_evidence_ids = ["policy:completion-input-ownership"]
stale_evidence_ids = ["code:completions.go#completionInput"]
forbidden_actions = ["move completionInput back into completions.go", "allow completion parsing to overwrite caller-owned input"]
hidden_patch = "hidden-tests.patch"
reference_patch = "reference.patch"

[[oracle.source_check]]
path = "completion_input.go"
scope_start = "func completionInput"
required_literals = ["append([]string(nil), args[:len(args)-1]...)"]

[[oracle.source_check]]
path = "completions.go"
forbidden_literals = ["func completionInput("]
