split = "development"
dependency_strength = "medium"
dependency_classification_status = "retrospective-development"
language = "go"
tags = ["cross-session", "code-change", "input-ownership", "stale-symbol", "external-repository", "historically-grounded", "development-controlled", "seeded-canonical"]

[repository]
source_type = "git"
