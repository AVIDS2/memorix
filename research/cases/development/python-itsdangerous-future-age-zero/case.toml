[transfer]
task = "Continue the timestamp-age validation helper extraction. A regression in an existing caller configuration now permits an invalid timestamp. Restore the established temporal-validation policy while keeping validation owned by the extracted helper."
success_commands = ["uv run --group tests pytest tests/test_itsdangerous/test_timed.py -q"]

[[memory_seed]]
entity_name = "strict-zero-max-age-policy"
type = "decision"
title = "Zero max age is still a strict age check"
narrative = "TimestampSigner must validate time whenever max_age is supplied. max_age=None disables age validation, while max_age=0 is a valid strict limit and must still reject a signature whose timestamp is in the future."
facts = ["max_age=None disables timestamp-age validation", "max_age=0 still validates timestamp age", "future timestamps raise SignatureExpired when max_age is supplied"]
files_modified = []
concepts = ["timestamp", "signature", "expiration", "security", "max_age"]
topic_key = "benchmark/python-itsdangerous-future-age-zero/policy"

