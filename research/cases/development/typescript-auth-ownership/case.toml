schema_version = "0.1"
id = "typescript-auth-ownership"
title = "Token policy and shard marker survive an ownership migration"
split = "development"
language = "typescript"
tags = ["cross-session", "code-change", "stale-symbol", "policy-retention"]

[repository]
source_type = "local-fixture"
path = "seed"
base_revision = "fixture-base"
license = "Apache-2.0"

[precursor]
task = "Harden access-token validation after the security review."
success_commands = ["npm test"]
patch = "precursor.patch"
transcript = "precursor-transcript.md"

[transition]
kind = "code-change"
description = "Validation ownership moves from auth.js into session.js and the old symbol is deleted."
apply_commands = []
patch = "transition.patch"

[transfer]
task = "Continue the token-validation migration. A regression now accepts prefixed tokens that violate the existing security policy; restore the existing policy without restoring the deleted auth module."
success_commands = ["npm test"]

[[memory_seed]]
entity_name = "access-token-policy"
type = "decision"
title = "Access token format and shard marker policy"
narrative = "Accepted access tokens must start with tok_, contain at least eighteen characters in total, and include at least one ASCII digit as an issuer shard marker. This is a durable security policy independent of implementation location."
facts = ["Prefix: tok_", "Minimum total length: 18", "At least one ASCII digit is required"]
files_modified = []
concepts = ["authentication", "token-policy", "security"]
topic_key = "benchmark/typescript-auth-ownership/policy"

[[memory_seed]]
entity_name = "access-token-validator"
type = "what-changed"
title = "Token validator code owner"
narrative = "At this snapshot access-token validation is implemented by src/auth.js#validateToken."
facts = []
files_modified = ["src/auth.js"]
concepts = ["authentication", "code-ownership"]
topic_key = "benchmark/typescript-auth-ownership/code-owner"

[oracle]
required_start_files = ["src/session.js"]
relevant_evidence_ids = ["policy:access-token-format", "test:short-token-rejection"]
stale_evidence_ids = ["code:src/auth.js#validateToken"]
forbidden_actions = ["restore src/auth.js", "weaken the tok_ prefix, 18-character, or shard-marker requirement"]
hidden_patch = "hidden-tests.patch"
reference_patch = "reference.patch"
