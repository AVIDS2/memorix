[[memory_seed]]
entity_name = "plugin-merge-policy"
type = "decision"
title = "Plugin identity is case-insensitive and order is stable"
narrative = "Plugins compare by lowercase id. The first occurrence owns output spelling and position. A requested plugin with the same identity replaces the earlier plugin object at that existing position; requested-only plugins append in request order."
facts = [
  "Compare plugin ids case-insensitively.",
  "Keep the first id spelling and position.",
  "Requested matching plugins replace the earlier object value.",
  "Append requested-only plugins in their request order.",
]
files_modified = ["src/plugins.mjs"]
concepts = ["plugins", "ordered merge"]
topic_key = "plugin-merge-policy"
related_entities = ["extension-registry"]

